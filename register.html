<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <section>
        <h1>Inscription</h1>
        <div class="input-box">
            <input type="text" id="username" placeholder="Nom utilisateur" oninput="validateUsername()">
            <span class="val-msg" id="username-msg"></span>
        </div>
        <div class="input-box">
            <input type="email" id="email" placeholder="Adresse email" oninput="validateEmail()">
            <span class="val-msg" id="email-msg"></span>
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Mot de passe" oninput="checkStrength(); validateConfirm()">
            <div class="strength-wrap" id="strength-wrap">
                <div class="strength-bars">
                    <div class="bar" id="b1"></div>
                    <div class="bar" id="b2"></div>
                    <div class="bar" id="b3"></div>
                    <div class="bar" id="b4"></div>
                </div>
                <span class="strength-label" id="strength-label"></span>
            </div>
        </div>
        <div class="input-box">
            <input type="password" id="confirm" placeholder="Confirmer le mot de passe" oninput="validateConfirm()">
            <span class="val-msg" id="confirm-msg"></span>
        </div>
        <div class="remenber-forgot">
            <label>
                <input type="checkbox" id="terms"> J'accepte les <a href="#">conditions</a>
            </label>
        </div>
        <button class="login-btn" onclick="handleRegister()">Créer mon compte</button>
        <div class="register-link">
            <p>Déjà un compte ? <a href="login.html">Connexion</a></p>
        </div>
    </section>

    <div class="toast" id="toast"></div>

    <script>
        function validateUsername() {
            const input = document.getElementById('username');
            const msg = document.getElementById('username-msg');
            if (input.value.length < 3) {
                msg.textContent = '✗ Minimum 3 caractères';
                msg.className = 'val-msg error';
                return false;
            }
            msg.textContent = '✓ Valide';
            msg.className = 'val-msg success';
            return true;
        }

        function validateEmail() {
            const input = document.getElementById('email');
            const msg = document.getElementById('email-msg');
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!re.test(input.value)) {
                msg.textContent = '✗ Email invalide';
                msg.className = 'val-msg error';
                return false;
            }
            msg.textContent = '✓ Email valide';
            msg.className = 'val-msg success';
            return true;
        }

        function checkStrength() {
            const v = document.getElementById('password').value;
            const wrap = document.getElementById('strength-wrap');
            const label = document.getElementById('strength-label');
            const bars = ['b1','b2','b3','b4'].map(id => document.getElementById(id));
            if (!v) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            let score = 0;
            if (v.length >= 8) score++;
            if (/[A-Z]/.test(v)) score++;
            if (/[0-9]/.test(v)) score++;
            if (/[^A-Za-z0-9]/.test(v)) score++;
            const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
            const labels = ['Très faible','Faible','Moyen','Fort'];
            bars.forEach((b, i) => { b.style.background = i < score ? colors[score-1] : 'rgba(255,255,255,0.2)'; });
            label.textContent = labels[score-1] || '';
            label.style.color = colors[score-1] || '#fff';
        }

        function validateConfirm() {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const msg = document.getElementById('confirm-msg');
            if (!confirm) { msg.textContent = ''; return false; }
            if (pass === confirm) {
                msg.textContent = '✓ Mots de passe identiques';
                msg.className = 'val-msg success';
                return true;
            }
            msg.textContent = '✗ Les mots de passe ne correspondent pas';
            msg.className = 'val-msg error';
            return false;
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.className = 'toast', 3500);
        }

        function handleRegister() {
            const ok1 = validateUsername();
            const ok2 = validateEmail();
            const ok3 = validateConfirm();
            const terms = document.getElementById('terms').checked;
            if (!terms) { showToast('Veuillez accepter les conditions', 'error'); return; }
            if (!ok1 || !ok2 || !ok3) { showToast('Veuillez corriger les erreurs', 'error'); return; }
            const btn = document.querySelector('.login-btn');
            btn.textContent = '...';
            btn.disabled = true;
            setTimeout(() => {
                showToast('Compte créé avec succès ! 🎉', 'success');
                btn.textContent = '✓ Compte créé !';
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
